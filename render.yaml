services:
  # ==========================================
  # ZOMP UNIFIED - API + FRONTEND + ADMIN
  # ==========================================
  - type: web
    name: zomp-fullstack
    runtime: node
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: node backend/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: zomp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: zomp-db
    plan: free
