services:
  # ==========================================
  # ZOMP UNIFIED - API + FRONTEND + ADMIN
  # ==========================================
  - type: web
    name: zomp-fullstack
    runtime: node
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build
      cd ../backend && npm install
    startCommand: cd backend && node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: zomp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: zomp-db
    plan: free
