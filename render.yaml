# Render Blueprint - Zomp Platform
# Deploy: Backend (Web Service) + Frontend (Static Site) + PostgreSQL

databases:
  - name: zomp-db
    plan: free
    databaseName: zomp
    user: zomp_user

services:
  # ==========================================
  # BACKEND - API Node.js + Prisma
  # ==========================================
  - type: web
    name: zomp-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && node seed.js
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zomp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: PRISMA_CLI_BINARY_TARGETS
        value: "native,debian-openssl-3.0.x"
      - key: PRISMA_QUERY_ENGINE_LIBRARY
        value: "./node_modules/@prisma/engines/libquery_engine-debian-openssl-3.0.x.so.node"

  # ==========================================
  # FRONTEND - React + Vite (Static Site)
  # ==========================================
  - type: web
    name: zomp-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /onboarding/*
        destination: /onboarding/index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://zomp-api.onrender.com/api
