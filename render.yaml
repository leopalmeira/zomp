services:
  # ==========================================
  # BACKEND - Node.js API (Native SQL Mode)
  # ==========================================
  - type: web
    name: zomp-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && node seed.js
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zomp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001

  # ==========================================
  # FRONTEND - React + Vite (Static Site)
  # ==========================================
  - type: static
    name: zomp-app
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://zomp-backend.onrender.com/api

databases:
  - name: zomp-db
    plan: free
