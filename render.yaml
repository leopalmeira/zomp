services:
  # ==========================================
  # ZOMP-API  —  Backend Node.js
  # ==========================================
  - type: web
    name: zomp-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: zomp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: leandro2703palmeira@gmail.com
      - key: ADMIN_PASSWORD
        value: Lps27031981@
      - key: ADMIN_NAME
        value: Leandro Palmeira

  # ==========================================
  # ZOMP-APP  —  PWA Passageiro + Motorista + Admin + Landing
  # Rotas:
  #   /            => Landing Page
  #   /passageiro  => App PWA do Passageiro
  #   /motorista   => App PWA do Motorista
  #   /admin       => Painel de Controle Admin
  # ==========================================
  - type: web
    name: zomp-app
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://zomp-api.onrender.com/api

databases:
  - name: zomp-db
    plan: free
