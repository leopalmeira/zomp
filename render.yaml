services:
  # ==========================================
  # BACKEND - Node.js API
  # ==========================================
  - type: web
    name: zomp-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: zomp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # ==========================================
  # FRONTEND - React + Vite
  # ==========================================
  - type: web
    name: zomp-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://zomp-api.onrender.com/api

databases:
  - name: zomp-db
    plan: free
